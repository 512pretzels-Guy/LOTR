<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOTR Collection Vault</title>
    <style>
        :root {
            /* Garage Pro Light Theme - LOTR Edition */
            --bg-light: #f4f1ea;
            --card-bg: #ffffff;
            --text-main: #212529;
            --royal-blue: #5c4033; /* Deep Earthy Brown for LOTR feel */
            --success-green: #2d5a27; /* Forest Green */
            --error-red: #8b0000;
            --gold-border: #d4af37; /* Elven Gold */
            --touch-target: 60px;
            --stack-padding: 20px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-light); color: var(--text-main); font-family: 'Garamond', serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        header { 
            background: var(--royal-blue); padding: 20px; color: white; 
            border-bottom: 5px solid var(--gold-border); display: flex; justify-content: space-between; align-items: center;
        }

        /* Hamburger Menu */
        .menu-icon { font-size: 2rem; cursor: pointer; padding: 5px 15px; }
        #side-menu {
            position: fixed; top: 0; right: -280px; width: 280px; height: 100%;
            background: #fff; box-shadow: -5px 0 15px rgba(0,0,0,0.2);
            z-index: 2000; transition: 0.3s; padding: 20px;
        }
        #side-menu.active { right: 0; }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: none; z-index: 1500;
        }
        .menu-btn {
            width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 8px;
            border: 1px solid #ddd; background: #f8f9fa; font-weight: bold; font-size: 1rem; text-align: left;
        }

        .container { padding: 15px; max-width: 800px; margin: auto; }

        /* Form & Cards */
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 800; margin-bottom: 5px; color: var(--royal-blue); text-transform: uppercase; font-size: 0.75rem; }
        input, select { width: 100%; padding: 12px; border: 2px solid #ced4da; border-radius: 8px; font-size: 1.1rem; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .photo-slot { aspect-ratio: 1/1; background: #e9ecef; border: 2px dashed #ccc; border-radius: 8px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .photo-slot img { width: 100%; height: 100%; object-fit: cover; }
        .photo-slot input { position: absolute; opacity: 0; width: 100%; height: 100%; }

        .item-card { background: #fff; border-bottom: 4px solid var(--gold-border); padding: 20px; margin-bottom: 15px; border-radius: 8px; }
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 0.85rem; margin-top: 10px; }
        .data-label { color: #6c757d; font-weight: bold; font-size: 0.7rem; text-transform: uppercase; display: block; }

        .btn { display: block; width: 100%; min-height: var(--touch-target); background: var(--royal-blue); color: white; border: none; border-radius: 8px; font-size: 1.2rem; font-weight: bold; margin-top: 15px; cursor: pointer; }
        .btn-csv { background: #555; font-size: 1rem; min-height: 50px; margin-bottom: 20px; }

        #modal { display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); width: 90%; padding: 20px; z-index: 3000; text-align: center; border-radius: 8px; color: white; font-weight: bold; }
        .hidden-canvas { display: none; }
    </style>
</head>
<body>

<div id="overlay" onclick="vault.toggleMenu()"></div>

<nav id="side-menu">
    <h2 style="color:var(--royal-blue); margin-top:0;">Middle-earth Tools</h2>
    <button class="menu-btn" onclick="vault.exportJSON()">📤 Export JSON Backup</button>
    <button class="menu-btn" onclick="document.getElementById('import-trigger').click()">📥 Import JSON Backup</button>
    <input type="file" id="import-trigger" style="display:none" onchange="vault.importJSON(this)">
    <hr>
    <button class="menu-btn" style="background:var(--error-red); color:white; border:none;" onclick="vault.toggleMenu()">Close Menu</button>
</nav>

<header>
    <h1 style="margin:0; font-size: 1.3rem; letter-spacing: 2px;">LOTR COLLECTIBLES</h1>
    <div class="menu-icon" onclick="vault.toggleMenu()">☰</div>
</header>

<div class="container">
    <div id="entry-form" class="item-card" style="border-left: 10px solid var(--royal-blue);">
        <input type="hidden" id="edit-id">
        <label id="form-action-label" style="font-size: 1rem; margin-bottom: 10px;">Catalogue New Treasure</label>
        <div class="form-group"><input type="text" id="inp-title" placeholder="Item Name (e.g. Shards of Narsil)"></div>
        <div class="grid-2">
            <div class="form-group">
                <label>Category</label>
                <select id="inp-cat">
                    <option>Weapon Replicas</option>
                    <option>Statues & Figures</option>
                    <option>Jewelry</option>
                    <option>Books & Prints</option>
                    <option>Props/Misc</option>
                </select>
            </div>
            <div class="form-group">
                <label>Condition</label>
                <select id="inp-cond">
                    <option>Pristine</option>
                    <option>Display Wear</option>
                    <option>Damaged</option>
                </select>
            </div>
        </div>
        <div class="grid-2">
            <div class="form-group"><label>Buy Price</label><input type="number" id="inp-price" step="0.01"></div>
            <div class="form-group"><label>Buy Date</label><input type="date" id="inp-date"></div>
        </div>
        <div class="grid-2">
            <div class="form-group"><label>Sold Price</label><input type="number" id="inp-sold" step="0.01"></div>
            <div class="form-group"><label>Sold Date</label><input type="date" id="inp-sold-date"></div>
        </div>
        <div class="form-group"><label>Location</label><input type="text" id="inp-loc" placeholder="Shelf/Display Case"></div>
        
        <label>Artifact Photos (Up to 6)</label>
        <div class="gallery-grid" id="entry-gallery"></div>
        
        <button class="btn btn-success" id="btn-save" onclick="vault.addItem()">Save Artifact</button>
        <button class="btn" id="btn-cancel" style="display:none; background:#6c757d;" onclick="vault.clear()">Cancel</button>
    </div>

    <button class="btn btn-csv" onclick="vault.exportCSV()">📊 Export Ledger to CSV (Excel)</button>

    <div id="inventory-list"></div>
</div>

<div id="modal"></div>
<canvas id="compressor" class="hidden-canvas"></canvas>

<script>
    const UI = {
        id: "edit-id", t: "inp-title", c: "inp-cat", co: "inp-cond", d: "inp-date", 
        p: "inp-price", s: "inp-sold", sd: "inp-sold-date", l: "inp-loc"
    };

    let activeImages = ["","","","","",""];

    const vault = {
        data: JSON.parse(localStorage.getItem('lotr_vault_v1')) || [],

        init: function() { this.buildGallery(); this.render(); },

        toggleMenu: function() {
            const menu = document.getElementById('side-menu');
            const overlay = document.getElementById('overlay');
            const isActive = menu.classList.toggle('active');
            overlay.style.display = isActive ? 'block' : 'none';
        },

        buildGallery: function() {
            const gal = document.getElementById('entry-gallery');
            gal.innerHTML = activeImages.map((img, i) => `
                <div class="photo-slot" id="slot-${i}">
                    ${img ? `<img src="${img}">` : `<span>+</span>`}
                    <input type="file" accept="image/*" onchange="vault.handleFile(${i}, this)">
                </div>
            `).join('');
        },

        handleFile: async function(index, input) {
            if (input.files[0]) {
                const r = new FileReader(); r.readAsDataURL(input.files[0]);
                r.onload = e => {
                    const img = new Image(); img.src = e.target.result;
                    img.onload = () => {
                        const cvs = document.getElementById('compressor'); const ctx = cvs.getContext('2d');
                        cvs.width = 800; cvs.height = img.height * (800 / img.width);
                        ctx.drawImage(img, 0, 0, 800, cvs.height);
                        activeImages[index] = cvs.toDataURL('image/jpeg', 0.6);
                        this.buildGallery();
                    }
                }
            }
        },

        addItem: function() {
            const title = document.getElementById(UI.t).value;
            const editId = document.getElementById(UI.id).value;
            if (!title) return this.notify("Title Required", false);

            const item = {
                id: editId ? parseInt(editId) : Date.now(),
                k1: title, k2: document.getElementById(UI.c).value, k3: document.getElementById(UI.co).value,
                k4: document.getElementById(UI.d).value, k5: document.getElementById(UI.p).value,
                k6: document.getElementById(UI.l).value, k7: document.getElementById(UI.s).value,
                k8: document.getElementById(UI.sd).value, imgs: activeImages.filter(x => x)
            };

            if (editId) {
                const idx = this.data.findIndex(x => x.id === item.id);
                this.data[idx] = item;
            } else { this.data.push(item); }

            localStorage.setItem('lotr_vault_v1', JSON.stringify(this.data));
            this.notify("Treasure Recorded", true);
            this.clear(); this.render();
        },

        exportCSV: function() {
            if (this.data.length === 0) return this.notify("No data found", false);
            let csv = "ID,Treasure_Name,Category,Condition,Acquisition_Date,Buy_Price,Location,Sold_Price,Sold_Date\n";
            this.data.forEach(i => {
                csv += `${i.id},"${i.k1}","${i.k2}","${i.k3}","${i.k4}",${i.k5 || 0},"${i.k6}",${i.k7 || 0},"${i.k8}"\n`;
            });
            const blob = new Blob([csv], {type: 'text/csv'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = `LOTR_Ledger_${new Date().toLocaleDateString()}.csv`; a.click();
        },

        exportJSON: function() {
            const blob = new Blob([JSON.stringify(this.data)], {type: 'application/json'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = `lotr_vault_backup.json`; a.click();
            this.toggleMenu();
        },

        importJSON: function(input) {
            const reader = new FileReader();
            reader.onload = e => {
                try {
                    this.data = JSON.parse(e.target.result);
                    localStorage.setItem('lotr_vault_v1', JSON.stringify(this.data));
                    this.render();
                    this.notify("Ledger Restored", true);
                    this.toggleMenu();
                } catch(err) { this.notify("Invalid File", false); }
            };
            reader.readAsText(input.files[0]);
        },

        render: function() {
            const list = document.getElementById('inventory-list');
            list.innerHTML = this.data.map(i => `
                <div class="item-card">
                    <div class="gallery-grid">${i.imgs.map(img => `<div class="photo-slot"><img src="${img}"></div>`).join('')}</div>
                    <h3 style="margin:15px 0 5px 0; color:var(--royal-blue);">${i.k1}</h3>
                    <div class="data-grid">
                        <div><span class="data-label">Cat/Cond</span><b>${i.k2} / ${i.k3}</b></div>
                        <div><span class="data-label">Price Paid</span><b>$${i.k5 || '0'}</b></div>
                        <div><span class="data-label">Acquired</span><b>${i.k4 || 'N/A'}</b></div>
                        <div><span class="data-label">Location</span><b>${i.k6 || 'N/A'}</b></div>
                    </div>
                    <button class="btn" style="min-height:40px; font-size:0.9rem; background:var(--gold-border);" onclick="vault.editItem(${i.id})">Inspect/Edit</button>
                    <button class="btn" style="min-height:40px; font-size:0.9rem; background:var(--error-red); margin-top:5px;" onclick="vault.deleteItem(${i.id})">Discard</button>
                </div>
            `).reverse().join('');
        },

        editItem: function(id) {
            const item = this.data.find(x => x.id === id);
            document.getElementById(UI.id).value = item.id;
            document.getElementById(UI.t).value = item.k1;
            document.getElementById(UI.p).value = item.k5;
            document.getElementById(UI.d).value = item.k4;
            document.getElementById(UI.l).value = item.k6;
            document.getElementById(UI.s).value = item.k7;
            document.getElementById(UI.sd).value = item.k8;
            activeImages = ["","","","","",""];
            item.imgs.forEach((img, i) => activeImages[i] = img);
            this.buildGallery();
            document.getElementById('btn-save').innerText = "Update Ledger";
            document.getElementById('btn-cancel').style.display = "block";
            window.scrollTo(0,0);
        },

        deleteItem: function(id) {
            if (confirm("Cast this item into the fire? (Delete permanently)")) {
                this.data = this.data.filter(x => x.id !== id);
                localStorage.setItem('lotr_vault_v1', JSON.stringify(this.data));
                this.render();
                this.notify("Item Removed", false);
            }
        },

        clear: function() {
            document.querySelectorAll('input').forEach(i => i.value = "");
            activeImages = ["","","","","",""]; this.buildGallery();
            document.getElementById('btn-save').innerText = "Save Artifact";
            document.getElementById('btn-cancel').style.display = "none";
        },

        notify: function(m, s) {
            const el = document.getElementById('modal');
            el.innerText = m; el.style.display = 'block';
            el.style.backgroundColor = s ? 'var(--success-green)' : 'var(--error-red)';
            setTimeout(() => el.style.display = 'none', 2000);
        }
    };
    vault.init();
</script>
</body>
</html>
